modLoader = "javafml"
loaderVersion = "[4,)"
license = "GPLv3"

[[mods]]
modId = "${id}"
version = "${version}"
displayName = "${name}"
description = "Refactors Minecraft's music to be dynamic and reactive, including new fantasy and celtic tracks to give an air of adventure."
authors = "CircuitLord"
logoFile = "assets/reactivemusic/icon.png"
displayURL = "https://modrinth.com/mod/reactive-music"

[[mixins]]
config = "reactivemusic-common.mixins.json"

[[dependencies.${id}]]
modId = "neoforge"
type = "required"
versionRange = "[21,)"
ordering = "NONE"
side = "CLIENT"

[[dependencies.${id}]]
modId = "minecraft"
type = "required"
versionRange = "${minecraft}"
ordering = "NONE"
side = "CLIENT"
