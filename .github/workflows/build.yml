name: Build

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:
    inputs:
      upload_artifacts:
        description: "Upload built release jars as a short-lived artifact"
        type: boolean
        default: false

permissions:
  contents: read
  actions: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build all Stonecutter targets
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: |
          chmod +x ./gradlew
          ./gradlew --no-daemon chiseledBuild

      - name: Delete older build artifacts
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.upload_artifacts }}
        uses: actions/github-script@v7
        with:
          script: |
            const artifacts = await github.paginate(github.rest.actions.listArtifactsForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });

            for (const artifact of artifacts) {
              if (artifact.name.startsWith('reactive-music-jars-')) {
                await github.rest.actions.deleteArtifact({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  artifact_id: artifact.id,
                });
              }
            }

      - name: Upload built jars
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.upload_artifacts }}
        uses: actions/upload-artifact@v4
        with:
          name: reactive-music-jars-${{ github.run_number }}
          path: |
            build/libs/**/*.jar
            !build/libs/**/*-sources.jar
          if-no-files-found: error
          compression-level: 0
          retention-days: 2
